name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write so the buffered inline-comment tool and `gh pr comment` can post the
      # review back to the PR. The previous `read` value silently produced zero
      # comments while still green-checking.
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464 # v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Automation mode (a `prompt` is provided). track_progress posts a
          # tracking comment with progress checkboxes — the same native posting
          # path the @claude mention flow uses, instead of the code-review plugin
          # trying to post via the read-only workflow gh token.
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for correctness and quality. Focus on:
            - Bugs, logic errors, and unhandled edge cases
            - Security issues (input validation, auth, data exposure)
            - Performance problems (N+1 queries, needless work in hot paths)
            - Missing or weak test coverage for the changed behavior

            Leave inline comments on the specific lines that need attention and a
            short top-level summary. Skip nitpicks and praise-only comments; only
            flag things worth changing.
          # The native inline-comment tool posts via the Claude GitHub App token
          # (works regardless of the workflow token); the gh commands cover the
          # top-level summary and reading PR context.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
