name: Main

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.changes.outputs.code }}
      shared: ${{ steps.changes.outputs.shared }}
      app: ${{ steps.changes.outputs.app }}
      worker: ${{ steps.changes.outputs.worker }}
      db_security: ${{ steps.changes.outputs.db_security }}
      db_migrations: ${{ steps.changes.outputs.db_migrations }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4.0.0
        id: changes
        with:
          filters: |
            code:
              - 'src/**'
              - 'public/**'
              - 'scripts/**'
              - 'shared/**'
              - 'supabase/**'
              - 'extensions/**'
              - '.github/workflows/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'biome.json'
              - 'components.json'
              - 'Dockerfile.worker'
              - 'ladle-vite.config.ts'
              - 'lefthook.yml'
              - 'vite.config.ts'
              - 'wrangler.jsonc'
            shared:
              - 'src/lib/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.json'
              - 'biome.json'
            app:
              - 'src/routes/**'
              - 'src/features/**'
              - 'src/components/**'
              - 'src/integrations/**'
              - 'src/types/**'
              - 'src/env.ts'
              - 'src/routeTree.gen.ts'
              - 'public/**'
              - 'vite.config.ts'
              - 'wrangler.jsonc'
            worker:
              - 'src/worker/**'
              - 'Dockerfile.worker'
            db_security:
              - 'supabase/**'
              - 'src/lib/data/**'
              - '.github/workflows/**'
            db_migrations:
              - 'supabase/migrations/**'

  verify:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: verify-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Skip docs-only changes
        if: needs.detect.outputs.code != 'true'
        run: echo "No code changes detected; skipping verify."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: needs.detect.outputs.code == 'true'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        if: needs.detect.outputs.code == 'true'
        with:
          no-cache: true

      - name: Restore Bun install cache
        if: needs.detect.outputs.code == 'true'
        id: bun-cache-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-cache-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-cache-

      - if: needs.detect.outputs.code == 'true'
        run: bun install --frozen-lockfile
      - if: needs.detect.outputs.code == 'true'
        run: bun run check
      - if: needs.detect.outputs.code == 'true'
        run: bun run typecheck
      - if: needs.detect.outputs.code == 'true'
        run: bun run typecheck:worker

      - if: needs.detect.outputs.code == 'true'
        run: bun run test

      - name: Build webapp
        if: needs.detect.outputs.code == 'true' && (needs.detect.outputs.app == 'true' || needs.detect.outputs.shared == 'true')
        run: bun run build

      - name: Smoke-build worker image
        if: needs.detect.outputs.code == 'true' && (needs.detect.outputs.worker == 'true' || needs.detect.outputs.shared == 'true')
        run: docker build -f Dockerfile.worker .

      - name: Save Bun install cache
        if: needs.detect.outputs.code == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.bun-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ steps.bun-cache-restore.outputs.cache-primary-key }}

  db-security:
    needs: detect
    if: needs.detect.outputs.db_security == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: db-security-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Restore Bun install cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-cache-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-cache-

      - run: bun install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start local Supabase and run DB security invariants
        run: |
          supabase start
          # Redirect, not `. <(...)`: process substitution hides a status failure from set -e.
          supabase status -o env \
            --override-name db.url=DATABASE_URL \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            --override-name auth.anon_key=SUPABASE_ANON_KEY > "$RUNNER_TEMP/supabase.env"
          set -a
          . "$RUNNER_TEMP/supabase.env"
          set +a
          # Gate must fail, not silently skip, on a missing/non-local URL.
          : "${DATABASE_URL:?DATABASE_URL not exported}"
          case "$DATABASE_URL" in
            *127.0.0.1*|*localhost*) ;;
            *) echo "::error::DATABASE_URL is not local; security invariants would skip"; exit 1 ;;
          esac

          bun run test src/lib/data/__tests__/security-invariants.integration.test.ts

  migrate-prod:
    needs: [detect, verify, db-security]
    if: >-
      !cancelled()
      && needs.verify.result == 'success'
      && (needs.db-security.result == 'success' || needs.db-security.result == 'skipped')
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && needs.detect.outputs.db_migrations == 'true'
    runs-on: ubuntu-latest
    environment: production-db
    timeout-minutes: 15
    concurrency:
      group: migrate-production-db
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Validate prod migration config
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing production-db secret SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "Missing production-db variable SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Missing production-db secret SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Apply prod migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

  deploy-app:
    needs: [detect, verify, db-security, migrate-prod]
    if: >-
      !cancelled()
      && needs.verify.result == 'success'
      && (needs.db-security.result == 'success' || needs.db-security.result == 'skipped')
      && (needs.migrate-prod.result == 'success' || needs.migrate-prod.result == 'skipped')
      && github.event_name == 'push'
      && needs.detect.outputs.code == 'true'
      && (needs.detect.outputs.app == 'true' || needs.detect.outputs.shared == 'true')
    runs-on: ubuntu-latest
    environment: production-app
    timeout-minutes: 20
    concurrency:
      group: deploy-app-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Restore Bun install cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-cache-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-cache-

      - run: bun install --frozen-lockfile

      - run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Required by src/env.public.ts at client module load — a missing value
          # builds green but crashes every page at runtime.
          VITE_PUBLIC_APP_ORIGIN: ${{ vars.VITE_PUBLIC_APP_ORIGIN }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT }}
          VITE_CHROME_EXTENSION_ID: ${{ vars.VITE_CHROME_EXTENSION_ID }}
          VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ vars.VITE_PUBLIC_POSTHOG_HOST }}
          # Canonical release: Sentry tag + sourcemap name + PostHog app_release.
          VITE_APP_RELEASE: ${{ github.sha }}

  deploy-worker:
    needs: [detect, verify, db-security, migrate-prod]
    if: >-
      !cancelled()
      && needs.verify.result == 'success'
      && (needs.db-security.result == 'success' || needs.db-security.result == 'skipped')
      && (needs.migrate-prod.result == 'success' || needs.migrate-prod.result == 'skipped')
      && github.event_name == 'push'
      && needs.detect.outputs.code == 'true'
      && (needs.detect.outputs.worker == 'true' || needs.detect.outputs.shared == 'true')
    runs-on: ubuntu-latest
    environment: production-worker
    timeout-minutes: 10
    concurrency:
      group: deploy-worker-production
      cancel-in-progress: false

    steps:
      - name: Trigger Coolify deploy
        run: >-
          curl
          --fail
          --show-error
          --retry 3
          --retry-delay 2
          --retry-all-errors
          --max-time 30
          -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
          "${{ secrets.COOLIFY_WORKER_DEPLOY_HOOK }}"
