# Lefthook configuration
# pre-commit: auto-fix staged files (format + safe lint fixes + organize imports)
# pre-push:   full quality gates (biome check + typecheck + tests) in parallel

min_version: 2.1.6

pre-commit:
  parallel: true
  commands:
    check:
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: bun biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      skip: [merge, rebase]

pre-push:
  parallel: true
  commands:
    guard-worker:
      # The dev worker's account-event publisher races the account-events
      # integration tests (it claims their rows and fires extra wake NOTIFYs),
      # so fail fast instead of burning a ~100s test run on a confusing failure.
      run: |
        if pgrep -f 'src/worker/index.ts' >/dev/null; then
          echo "❌ Stop the dev worker (bun run dev) before pushing — it races the account-event integration tests."
          exit 1
        fi
      skip: [merge, rebase]
    check:
      run: bun run check
      skip: [merge, rebase]
    typecheck:
      # Bust tsgo's incremental cache so this gate runs a FULL check, matching CI
      # (fresh checkout = no .tsbuildinfo). A stale cache once let a type error
      # pass pre-push yet fail CI, which stranded a migration. Cover both projects
      # CI typechecks (main + worker).
      run: rm -rf node_modules/.cache/tsgo && bun run typecheck && bun run typecheck:worker
      skip: [merge, rebase]
    test:
      run: bun run test
      skip: [merge, rebase]
