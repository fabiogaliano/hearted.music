# Lefthook configuration
# pre-commit: auto-format staged files
# pre-push:   full biome check (lint + assist) so CI failures get caught locally

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: bun biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  commands:
    check:
      run: bun run check
