# Lefthook configuration
# pre-commit: auto-fix staged files (format + safe lint fixes + organize imports)
# pre-push:   full quality gates (biome check + typecheck + tests) in parallel

min_version: 2.1.6

pre-commit:
  parallel: true
  commands:
    check:
      glob: "*.{ts,tsx,js,jsx,json,css,md}"
      run: bun biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
      skip: [merge, rebase]

pre-push:
  parallel: true
  commands:
    check:
      run: bun run check
      skip: [merge, rebase]
    typecheck:
      # Bust tsgo's incremental cache so this gate runs a FULL check, matching CI
      # (fresh checkout = no .tsbuildinfo). A stale cache once let a type error
      # pass pre-push yet fail CI, which stranded a migration. Cover both projects
      # CI typechecks (main + worker).
      run: rm -rf node_modules/.cache/tsgo && bun run typecheck && bun run typecheck:worker
      skip: [merge, rebase]
    test:
      run: bun run test
      skip: [merge, rebase]
